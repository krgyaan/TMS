apiVersion: 1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
type: Opaque
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'tms'
        type: file
        default: true
        options:
          path: /etc/grafana/provisioning/dashboards
          readOnly: true